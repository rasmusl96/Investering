<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Investeringsberegner</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#070b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Investering" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #070b12; color: #e2e8f0; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.12); outline: none; width: 100%; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #1e40af; }
    button { font-family: 'DM Sans', sans-serif; border: none; }
    #root { min-height: 100%; }
    #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#070b12; color:#3b82f6; font-size:14px; font-family:sans-serif; }
  </style>
</head>
<body>
  <div id="loading">Indlæser...</div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script>
    window.addEventListener('load', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("./sw.js").catch(function(){});
      });
    }
  </script>
</body>
</html>
